<mat-card class="max-h-150 md:max-h-none md:flex-1 md:overflow-auto p-4 shadow-md rounded-2xl">
  <div class="text-lg font-semibold mb-3">{{ heading() }}</div>

  <div class="flex-1 overflow-auto">
    <table mat-table [dataSource]="categories()" class="w-full">
      <!-- Name -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let t">{{ t.name }}</td>
      </ng-container>

      <!-- Actions -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="text-end!">Actions</th>
        <td mat-cell *matCellDef="let t">
          <div class="flex justify-end gap-2">
            <button mat-icon-button class="text-blue-600!" (click)="edit(t)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button class="text-red-600!" (click)="delete(t)">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns()"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns()"></tr>
    </table>
  </div>
</mat-card>
