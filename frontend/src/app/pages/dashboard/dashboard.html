<app-root-layout heading="Dashboard">
  <div class="flex flex-col gap-6">
    <!-- Summary Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <!-- Balance -->
      <mat-card class="p-4 shadow-md rounded-2xl bg-green-300! text-green-700">
        <div class="text-sm">Total Balance</div>
        <div class="text-2xl font-bold">₱ 25,430.00</div>
      </mat-card>

      <!-- Income -->
      <mat-card class="p-4 shadow-md rounded-2xl bg-blue-300! text-blue-700">
        <div class="text-sm">Monthly Income</div>
        <div class="text-2xl font-bold">₱ 40,000.00</div>
      </mat-card>

      <!-- Expenses -->
      <mat-card class="p-4 shadow-md rounded-2xl bg-red-300! text-red-700">
        <div class="text-sm">Monthly Expenses</div>
        <div class="text-2xl font-bold">₱ 14,570.00</div>
      </mat-card>
    </div>

    <!-- Charts + Breakdown -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
      <!-- Expense Breakdown -->
      <mat-card class="p-4 shadow-md rounded-2xl">
        <div class="text-lg font-semibold mb-3">Expenses Breakdown</div>

        <div class="flex justify-center">
          <canvas
            baseChart
            [data]="pieChartData"
            [type]="pieChartType"
            [options]="pieChartOptions"
            [plugins]="[chartDataLabels]"
          >
          </canvas>
        </div>
      </mat-card>

      <!-- Savings Goal -->
      <mat-card class="p-4 shadow-md rounded-2xl">
        <div class="text-lg font-semibold mb-3">Savings Goal</div>

        <div class="flex flex-col gap-2">
          <div class="flex justify-between">
            <span>Emergency Fund</span>
            <span>₱ 10,000 / ₱ 50,000</span>
          </div>

          <mat-progress-bar value="20" color="primary"></mat-progress-bar>

          <button mat-raised-button color="primary" class="mt-3">Add Savings</button>
        </div>
      </mat-card>
    </div>

    <!-- Recent Transactions -->
    <mat-card class="p-4 shadow-md rounded-2xl">
      <div class="text-lg font-semibold mb-3">Recent Transactions</div>

      <table mat-table [dataSource]="transactions" class="w-full">
        <!-- Date -->
        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef>Date</th>
          <td mat-cell *matCellDef="let t">{{ t.date }}</td>
        </ng-container>

        <!-- Description -->
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef>Description</th>
          <td mat-cell *matCellDef="let t">{{ t.description }}</td>
        </ng-container>

        <!-- Amount -->
        <ng-container matColumnDef="amount">
          <th mat-header-cell *matHeaderCellDef>Amount</th>
          <td
            mat-cell
            *matCellDef="let t"
            [class]="t.type === 'income' ? 'text-green-600' : 'text-red-500'"
          >
            {{ t.type === 'income' ? '+' : '-' }}₱ {{ t.amount }}
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="['date', 'description', 'amount']"></tr>
        <tr mat-row *matRowDef="let row; columns: ['date', 'description', 'amount']"></tr>
      </table>
    </mat-card>
  </div>
</app-root-layout>
<app-add-transaction></app-add-transaction>
