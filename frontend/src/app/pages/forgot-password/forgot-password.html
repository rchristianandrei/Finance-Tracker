<div class="h-screen w-screen flex justify-center items-center">
  <form
    [formGroup]="forgotPasswordForm"
    (ngSubmit)="onSubmit()"
    class="flex flex-col gap-3.75 w-100 m-5 p-5 rounded shadow-2xl"
  >
    <h1 class="text-3xl text-center">Forgot Password</h1>

    <p class="text-sm text-center text-gray-500">
      Enter your email and we'll send you a reset link.
    </p>

    <!-- Email Field -->
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email" type="email" />
      @if (f['email'].invalid && f['email'].touched) {
        <mat-error>Valid email required</mat-error>
      }
    </mat-form-field>

    <!-- Success Message -->
    @if (successMessage()) {
      <div class="text-green-600 text-center text-sm">
        {{ successMessage() }}
      </div>
    }

    <!-- Error Message -->
    @if (errorMessage()) {
      <mat-error class="text-center">{{ errorMessage() }}</mat-error>
    }

    <!-- Submit Button -->
    <div class="flex flex-col gap-2.5">
      <button
        mat-raised-button
        color="primary"
        type="submit"
        [disabled]="isLoading() || forgotPasswordForm.invalid"
        class="flex items-center justify-center gap-2"
      >
        @if (isLoading()) {
          <mat-spinner diameter="20"></mat-spinner>
        } @else {
          Send Reset Link
        }
      </button>

      <!-- Back to Login -->
      <a mat-button routerLink="/login">Back to login</a>
    </div>
  </form>
</div>
