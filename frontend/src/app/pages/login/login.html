<div class="h-screen w-screen flex justify-center items-center">
  <form
    [formGroup]="loginForm"
    (ngSubmit)="onSubmit()"
    class="flex flex-col gap-3.75 w-100 m-5 p-5 rounded shadow-2xl"
  >
    <h1 class="text-3xl text-center">Welcome Back</h1>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email" type="email" />
      @if (f['email'].invalid && f['email'].touched) {
        <mat-error>Valid email required</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Password</mat-label>
      <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" />
      <button
        mat-icon-button
        matSuffix
        type="button"
        (click)="hidePassword = !hidePassword"
        [attr.aria-label]="'Toggle password visibility'"
      >
        <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
      @if (f['password'].invalid && f['password'].touched) {
        <mat-error>Password is required</mat-error>
      }
    </mat-form-field>

    @if (errorMessage()) {
      <mat-error class="text-center">{{ errorMessage() }}</mat-error>
    }

    <div class="flex flex-col gap-2.5">
      <button
        mat-raised-button
        color="primary"
        type="submit"
        [disabled]="isLoading() || loginForm.invalid"
        class="flex items-center justify-center gap-2"
      >
        @if (isLoading()) {
          <mat-spinner diameter="20"></mat-spinner>
        } @else {
          Login
        }
      </button>

      <a mat-button routerLink="/register">Don't have an account? Register</a>

      <a routerLink="/forgot-password" class="text-xs! text-blue-600 hover:opacity-50 text-center">
        Forgot password?
      </a>
    </div>
  </form>
</div>
