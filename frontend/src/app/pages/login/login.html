<div class="h-screen w-screen flex justify-center items-center">
  <form
    [formGroup]="loginForm"
    (ngSubmit)="onSubmit()"
    class="flex flex-col gap-3.75 w-100 m-5 p-5 rounded shadow-2xl"
  >
    <h1 class="text-3xl text-center">Welcome Back</h1>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email" type="email" />
      @if (f['email'].invalid && f['email'].touched) {
        <mat-error>Valid email required</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Password</mat-label>
      <input matInput [type]="hidePassword() ? 'password' : 'text'" formControlName="password" />
      <button
        mat-icon-button
        matSuffix
        type="button"
        (click)="hidePassword.update(prev => !prev)"
        [attr.aria-label]="'Toggle password visibility'"
      >
        <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
      @if (f['password'].invalid && f['password'].touched) {
        <mat-error>Password is required</mat-error>
      }
    </mat-form-field>

    @if (errorMessage()) {
      <mat-error class="text-center">{{ errorMessage() }}</mat-error>
    }

    <div class="flex flex-col gap-2.5">
      <button
        mat-raised-button
        color="primary"
        type="submit"
        [disabled]="isLoading() || loginForm.invalid"
        class="flex items-center justify-center gap-2"
      >
        @if (isLoading()) {
          <mat-spinner diameter="20"></mat-spinner>
        } @else {
          Login
        }
      </button>

      @if (!isLoading()) {
        <div #googleBtn class="w-full">
          @if (showGoogleBtn()) {
            <asl-google-signin-button
              type="standard"
              size="large"
              text="continue_with"
              shape="pill"
              theme="outline"
              [width]="googleBtnWidth()"
            >
            </asl-google-signin-button>
          }
        </div>
      }
    </div>
  </form>
</div>
