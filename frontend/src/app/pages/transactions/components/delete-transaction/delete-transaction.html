<div class="fixed inset-0 flex items-center justify-center z-50">
  <!-- Backdrop -->
  <div class="absolute inset-0 bg-black/40" (click)="close()"></div>

  <!-- Modal -->
  <mat-card class="relative z-10 w-full max-w-md p-6 rounded-2xl shadow-xl">
    <!-- Header -->
    <div class="flex justify-between items-center">
      <h2 class="text-xl font-semibold">Delete Transaction</h2>

      <button mat-icon-button (click)="close()">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <p class="mt-3 text-sm text-gray-600">Are you sure you want to delete this transaction?</p>

    <div class="mt-3 p-3 rounded-lg bg-gray-100 text-sm">
      <div class="flex justify-between">
        <span class="text-gray-500">Date</span>
        <span class="font-medium">
          {{ transaction().date | date: 'MMM d, y' }}
        </span>
      </div>

      <div class="flex justify-between">
        <span class="text-gray-500">Category</span>
        <span class="font-medium">
          {{ transaction().category }}
        </span>
      </div>

      <div class="flex justify-between">
        <span class="text-gray-500">Amount</span>
        <span class="font-semibold">
          {{ transaction().amount }}
        </span>
      </div>
    </div>

    @if (errorMessage()) {
      <mat-error class="text-center">{{ errorMessage() }}</mat-error>
    }

    <div class="flex justify-end gap-2 mt-2">
      <button mat-button type="button" (click)="close()">Cancel</button>

      <button
        mat-raised-button
        color="warn"
        class="text-white! hover:opacity-50 transition bg-red-600!"
        (click)="delete()"
        [disabled]="isLoading()"
      >
        @if (isLoading()) {
          <mat-spinner diameter="20" class="white-spinner"></mat-spinner>
        } @else {
          Delete
        }
      </button>
    </div>
  </mat-card>
</div>
