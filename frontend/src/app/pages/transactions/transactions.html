<app-root-layout heading="Transactions">
  <div class="flex flex-col gap-6 h-full">
    <!-- Search + Filters -->
    <mat-card class="p-4 shadow-md rounded-2xl">
      <form
        [formGroup]="filterForm"
        (ngSubmit)="applyFilters()"
        class="flex flex-col lg:flex-row gap-2 lg:items-center lg:justify-between"
      >
        <div class="flex flex-col md:flex-row justify-around gap-2">
          <!-- Search -->
          <mat-form-field appearance="outline" subscriptSizing="dynamic" class="w-full">
            <mat-label>Search</mat-label>
            <input matInput placeholder="Search description..." formControlName="searchTerm" />
            <mat-icon matSuffix>search</mat-icon>
          </mat-form-field>

          <!-- Date Range -->
          <div class="flex flex-row justify-around gap-2">
            <mat-form-field appearance="outline" subscriptSizing="dynamic" class="flex-1">
              <mat-label>Start Date</mat-label>
              <input matInput [matDatepicker]="startPicker" formControlName="startDate" />
              <mat-datepicker-toggle matSuffix [for]="startPicker"></mat-datepicker-toggle>
              <mat-datepicker #startPicker></mat-datepicker>
            </mat-form-field>

            <mat-form-field appearance="outline" subscriptSizing="dynamic" class="flex-1">
              <mat-label>End Date</mat-label>
              <input matInput [matDatepicker]="endPicker" formControlName="endDate" />
              <mat-datepicker-toggle matSuffix [for]="endPicker"></mat-datepicker-toggle>
              <mat-datepicker #endPicker></mat-datepicker>
            </mat-form-field>
          </div>
        </div>

        <div class="flex flex-row gap-2">
          <button mat-raised-button type="button" (click)="clearFilters()">Reset</button>
          <button mat-raised-button color="primary" type="submit">Apply</button>
        </div>
      </form>
    </mat-card>

    <!-- Transactions Table -->
    <mat-card class="flex-1 overflow-auto p-4 shadow-md rounded-2xl">
      <div class="text-lg font-semibold mb-3">Transaction History</div>

      <div class="flex-1 overflow-auto">
        <table mat-table [dataSource]="dataSource()" class="w-full">
          <!-- Date -->
          <ng-container matColumnDef="date">
            <th mat-header-cell *matHeaderCellDef>Date</th>
            <td mat-cell *matCellDef="let t">
              {{ t.date | date: 'MMM d, y' }}
            </td>
          </ng-container>

          <!-- Category -->
          <ng-container matColumnDef="category">
            <th mat-header-cell *matHeaderCellDef>Category</th>
            <td mat-cell *matCellDef="let t">{{ t.category }}</td>
          </ng-container>

          <!-- Description -->
          <ng-container matColumnDef="description">
            <th mat-header-cell *matHeaderCellDef>Description</th>
            <td mat-cell *matCellDef="let t">{{ t.description }}</td>
          </ng-container>

          <!-- Type -->
          <ng-container matColumnDef="type">
            <th mat-header-cell *matHeaderCellDef>Type</th>
            <td mat-cell *matCellDef="let t">
              <span
                class="px-2 py-1 rounded-full text-xs font-medium"
                [class]="
                  t.type === 'INCOME' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-600'
                "
              >
                {{ t.type }}
              </span>
            </td>
          </ng-container>

          <!-- Amount -->
          <ng-container matColumnDef="amount">
            <th mat-header-cell *matHeaderCellDef class="text-center!">Amount</th>
            <td
              mat-cell
              *matCellDef="let t"
              [class]="t.type === 'INCOME' ? 'text-green-600' : 'text-red-500'"
            >
              <div class="flex justify-between items-center">
                <span>₱</span>
                <span>{{ t.amount | number: '1.2-2' }}</span>
              </div>
            </td>
          </ng-container>

          <!-- Actions -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="text-center!">Actions</th>
            <td mat-cell *matCellDef="let t">
              <div class="flex justify-center gap-2">
                <button mat-icon-button class="text-red-600!">
                  <mat-icon>delete</mat-icon>
                </button>
                <button mat-icon-button class="text-blue-600!">
                  <mat-icon>edit</mat-icon>
                </button>
              </div>
            </td>
          </ng-container>

          <!-- Header + Rows -->
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      </div>

      <!-- Pagination -->
      <div class="flex justify-center">
        <mat-paginator
          [length]="totalItems"
          [pageSize]="pageSize()"
          [pageSizeOptions]="[5, 10, 20]"
          (page)="onPageChange($event)"
          class="mt-4"
        >
        </mat-paginator>
      </div>
    </mat-card>
  </div>
</app-root-layout>
<app-add-transaction></app-add-transaction>
