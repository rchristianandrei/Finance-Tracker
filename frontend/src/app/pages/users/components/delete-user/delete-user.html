<h2 mat-dialog-title class="text-xl! font-semibold!">Delete User</h2>

<mat-dialog-content class="overflow-hidden! py-0! flex! flex-col gap-1!">
  <p>Are you sure you want to delete this user?</p>
  <div class="px-3 rounded-lg text-sm">
    <div class="flex justify-between">
      <span class="text-gray-500">Id</span>
      <span class="font-semibold">
        {{ data.user.id }}
      </span>
    </div>

    <div class="flex justify-between">
      <span class="text-gray-500">First Name</span>
      <span class="font-medium">
        {{ data.user.firstName }}
      </span>
    </div>

    <div class="flex justify-between">
      <span class="text-gray-500">Last Name</span>
      <span class="font-medium">
        {{ data.user.lastName }}
      </span>
    </div>
  </div>
  @if (errorMessage()) {
    <mat-error class="text-red-400 text-center block">{{ errorMessage() }}</mat-error>
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()" [disabled]="isLoading()">Cancel</button>
  <button
    mat-raised-button
    type="submit"
    color="primary"
    (click)="delete()"
    [disabled]="isLoading()"
  >
    @if (isLoading()) {
      <mat-spinner diameter="20"></mat-spinner>
    } @else {
      Delete
    }
  </button>
</mat-dialog-actions>
