<app-root-layout heading="Users">
  <div class="flex flex-col gap-6 md:h-full">
    <!-- Search + Filters -->
    <mat-card class="p-4 shadow-md rounded-2xl">
      <form
        [formGroup]="filterForm"
        class="flex flex-col lg:flex-row gap-2 lg:items-center lg:justify-between"
      >
        <div class="flex flex-col md:flex-row justify-around gap-2">
          <!-- Search -->
          <mat-form-field appearance="outline" subscriptSizing="dynamic" class="w-full">
            <mat-label>Search</mat-label>
            <input matInput placeholder="Search description..." formControlName="searchTerm" />
            <mat-icon matSuffix>search</mat-icon>
          </mat-form-field>

          <!-- Date Range -->
          <mat-form-field
            appearance="outline"
            subscriptSizing="dynamic"
            formGroupName="dateRange"
            class="w-full"
          >
            <mat-label>Date range</mat-label>

            <mat-date-range-input [rangePicker]="rangePicker">
              <input matStartDate formControlName="start" placeholder="Start date" />
              <input matEndDate formControlName="end" placeholder="End date" />
            </mat-date-range-input>

            <mat-datepicker-toggle matSuffix [for]="rangePicker"></mat-datepicker-toggle>
            <mat-date-range-picker #rangePicker></mat-date-range-picker>
          </mat-form-field>
        </div>

        <div class="flex items-center justify-center flex-row gap-2">
          <mat-paginator
            [length]="manageUsersService.totalUsers()"
            [pageIndex]="page()"
            [pageSizeOptions]="[5, 10, 20]"
            [hidePageSize]="true"
            (page)="onPageChange($event)"
            class="bg-transparent!"
          >
          </mat-paginator>
          <button mat-raised-button type="button" (click)="clearFilters()">Reset</button>
        </div>
      </form>
    </mat-card>
    <!-- Transactions Table -->
    <mat-card class="md:flex-1 md:overflow-auto p-4 shadow-md rounded-2xl">
      <div class="text-lg font-semibold mb-3">Current Users</div>

      <div class="flex-1 overflow-auto">
        <table mat-table [dataSource]="manageUsersService.users()" class="w-full">
          <!-- Id -->
          <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef>Id</th>
            <td mat-cell *matCellDef="let t">
              {{ t.id }}
            </td>
          </ng-container>

          <!-- First Name -->
          <ng-container matColumnDef="firstName">
            <th mat-header-cell *matHeaderCellDef>First Name</th>
            <td mat-cell *matCellDef="let t">{{ t.firstName }}</td>
          </ng-container>

          <!-- Last Name -->
          <ng-container matColumnDef="lastName">
            <th mat-header-cell *matHeaderCellDef>Last Name</th>
            <td mat-cell *matCellDef="let t">{{ t.lastName }}</td>
          </ng-container>

          <!-- Created At -->
          <ng-container matColumnDef="createdAt">
            <th mat-header-cell *matHeaderCellDef>Date Created</th>
            <td mat-cell *matCellDef="let t">{{ t.createdAt | date: 'MMM d' }}</td>
          </ng-container>

          <!-- Actions -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="text-end!">Actions</th>
            <td mat-cell *matCellDef="let t">
              <div class="flex justify-end gap-2">
                <button
                  mat-icon-button
                  class="text-blue-600!"
                  (click)="manageUsersService.update(t)"
                >
                  <mat-icon>edit</mat-icon>
                </button>
                <button
                  mat-icon-button
                  class="text-red-600!"
                  (click)="manageUsersService.delete(t)"
                >
                  <mat-icon>delete</mat-icon>
                </button>
              </div>
            </td>
          </ng-container>

          <!-- Header + Rows -->
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      </div>
    </mat-card>
  </div>
</app-root-layout>
